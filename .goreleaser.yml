version: 2
before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "7"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(\w+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(\w+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(\w+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^ci:"

brews:
  - repository:
      owner: hay-kot
      name: homebrew-dirwatch-tap
    description: |
      dirwatch is a simple, standalone tool that watches a path and runs a command whenever it
      detects a matching event.
    license: MIT
    dependencies:
      - name: go
        type: optional
      - name: git
    service: |
      run [opt_bin/"dirwatch", "watch"]
      environment_variables PATH: std_service_path_env
      environment_variables DIRWATCH_CONFIG: etc/"config.yaml"
      keep_alive true
      error_log_path var/"log/dirwatch.log"
      log_path var/"log/dirwatch.log"
    test: |
      system "#{bin}/dirwatch --version"
